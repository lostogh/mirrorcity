<script>
function filterText() {
    let input = document.getElementById("search").value.toLowerCase();
    let lines = document.querySelectorAll("p");

    lines.forEach(p => {
        let text = p.innerText.toLowerCase();
        p.style.display = text.includes(input) ? "" : "none";
    });
}
</script>
