<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Scenario Viewer</title>

<style>
body {
  margin:0;
  display:flex;
  background:#111;
  color:#eee;
  font-family:sans-serif;
}

#fileList {
  width:260px;
  background:#1a1a1a;
  border-right:1px solid #333;
  height:100vh;
  overflow-y:auto;
  padding:10px;
}

.file-item {
  padding:6px;
  cursor:pointer;
  border-bottom:1px solid #222;
}
.file-item:hover {
  background:#333;
}

#viewer {
  flex:1;
  padding:20px;
  overflow:auto;
}

.block { margin-bottom:14px; }

.speaker {
  color:#6cf;
  font-weight:bold;
}

.choice-container {
  display:grid;
  gap:10px;
  margin:20px 0;
}

.choice {
  background:#1a1a1a;
  border:1px solid #333;
  padding:10px;
  border-radius:6px;
}
</style>
</head>

<body>

<div id="fileList"></div>
<div id="viewer"></div>

<script>

// =======================
// 파일 목록 로드
// =======================
async function loadFileList() {
  const res = await fetch("./data/index.json");
  const files = await res.json();

  const listDiv = document.getElementById("fileList");

  files.forEach(name => {
    const el = document.createElement("div");
    el.className = "file-item";
    el.innerText = name;

    el.onclick = () => loadScenario(name);

    listDiv.appendChild(el);
  });

  // 첫 파일 자동 로드
  if (files.length > 0) loadScenario(files[0]);
}

// =======================
// 시나리오 로드 (핵심)
// =======================
async function loadScenario(name) {
  const res = await fetch("./data/" + encodeURI(name));
  const text = await res.text();

  const raw = removeComments(text);
  const parsed = parse(raw);
  render(parsed);
}

// =======================
// 텍스트 처리
// =======================
function cleanText(line) {
  return line
    .replace(/<ruby>(.*?)<rt>(.*?)<\/rt><\/ruby>/g, "$1($2)")
    .replace(/<[^>]*>/g, "")
    .replace(/[▼■]/g, "")
    .trim();
}

function removeComments(text) {
  return text.replace(/<!--[\s\S]*?-->/g, "");
}

// =======================
// 파서 (핵심만 유지)
// =======================
function pushDialogue(arr, speaker, buffer) {
  if (!buffer.length) return;

  arr.push({
    type: "dialogue",
    speaker,
    text: buffer.join("\n")
  });

  buffer.length = 0;
}

function parse(text) {

  const lines = text.split("\n").map(l => l.trim()).filter(l => l);

  let result = [];
  let currentSpeaker = "";
  let buffer = [];

  for (let i = 0; i < lines.length; i++) {

    let line = lines[i];
    let txt = cleanText(line);

    if (line.startsWith("<話者>")) {
      pushDialogue(result, currentSpeaker, buffer);
      currentSpeaker = txt;
      continue;
    }

    if (txt) {
      buffer.push(txt);
    }
  }

  pushDialogue(result, currentSpeaker, buffer);

  return { data: result };
}

// =======================
// 렌더
// =======================
function render(parsed) {

  const viewer = document.getElementById("viewer");
  viewer.innerHTML = "";

  let lastSpeaker = null;

  parsed.data.forEach(block => {

    if (block.type === "dialogue") {

      let speakerHTML = "";

      if (block.speaker && block.speaker !== lastSpeaker) {
        speakerHTML = `<div class="speaker">${block.speaker}</div>`;
        lastSpeaker = block.speaker;
      }

      viewer.innerHTML += `
        <div class="block">
          ${speakerHTML}
          <div>${block.text.replace(/\n/g,"<br>")}</div>
        </div>
      `;
    }

  });
}

// =======================
loadFileList();
// =======================

</script>

</body>
</html>
